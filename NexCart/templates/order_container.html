<div class="small-container cart-page">
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
            {% for order in orders %}
                <tr>
                    <td>{{ order.id }}</td>
                    <td>{{ order.created_at }}</td>
                    <td>${{ order.total_price }}</td>
                    <td>{{ order.get_order_status_display }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="4">No confirmed orders yet.</td></tr>
            {% endfor %}
            </tbody>
        </table>
        <div class="total-price"></div>
